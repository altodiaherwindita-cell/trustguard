version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: trustguard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-trustguard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${DB_NAME:-trustguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trustguard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trustguard-network

  # Backend API (to be created)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: trustguard-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-trustguard}:${DB_PASSWORD:-changeme_in_production}@db:5432/${DB_NAME:-trustguard}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trustguard-network

  # Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://api:3000}
    container_name: trustguard-web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://api:3000}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trustguard-network

volumes:
  postgres_data:
    driver: local

networks:
  trustguard-network:
    driver: bridge
